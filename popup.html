<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 220px;
      padding: 16px;
      font-family: system-ui, sans-serif;
      font-size: 14px;
    }
    h3 {
      margin: 0 0 12px;
      font-size: 14px;
    }
    .picker-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    input[type="color"] {
      width: 48px;
      height: 36px;
      border: 1px solid #ccc;
      border-radius: 4px;
      cursor: pointer;
      padding: 2px;
    }
    #hex {
      font-family: monospace;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <h3>Progress Bar Color</h3>
  <div class="picker-row">
    <input type="color" id="colorPicker" value="#0000ff">
    <span id="hex">#0000ff</span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
